<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeckFocus — Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0E0D0B;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: #1A1714;
            border: 1px solid rgba(212,184,150,0.2);
            padding: 48px;
            width: 100%;
            max-width: 420px;
        }

        .brand {
            font-family: sans-serif;
            font-size: 10px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #D4B896;
            text-align: center;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 24px;
            font-weight: 300;
            font-style: italic;
            color: #FAF8F5;
            text-align: center;
            margin-bottom: 40px;
        }

        .field {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-family: sans-serif;
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(212,184,150,0.6);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(212,184,150,0.3);
            padding: 10px 0;
            color: #FAF8F5;
            font-family: Georgia, serif;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-bottom-color: #D4B896;
        }

        .btn {
            width: 100%;
            background: #D4B896;
            color: #0E0D0B;
            border: none;
            padding: 16px;
            font-family: sans-serif;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 32px;
        }

        .btn:hover { background: #c9a97e; }

        .error {
            background: rgba(192,57,43,0.15);
            border: 1px solid rgba(192,57,43,0.3);
            color: #e74c3c;
            padding: 12px;
            font-family: sans-serif;
            font-size: 12px;
            text-align: center;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <p class="brand">BeckFocus Production</p>
        <h1>Espace admin</h1>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/auth/login-form">
            <div class="field">
                <label>Identifiant</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="field">
                <label>Mot de passe</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">Se connecter →</button>
        </form>
    </div>
</body>
</html>
