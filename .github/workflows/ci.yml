name: BeckFocus API — CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: |
          pip install -r requirements.txt

      - name: Lancement des tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          META_VERIFY_TOKEN: ${{ secrets.META_VERIFY_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: |
          pytest tests/ -v

  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build image Docker
        run: |
          docker build -t beckfocus-api .

      - name: Vérification de l'image
        run: |
          docker run --rm beckfocus-api python -c "import fastapi; print('FastAPI OK')"